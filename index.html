<!DOCTYPE html>
<html>
  <head>
    <title>Giga Pet - Biscuit</title>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="style.css">
  </head>
  <body>

    <header>
      <h1>Biscuit</h1>
    </header>

    <main>
      <!-- Pet image section - image updated from starter code -->
      <section class="pet-image-container">
        <img class="pet-image" src="images/idle.png" alt="Biscuit the hound">
      </section>

      <!-- Dashboard showing pet stats and action buttons -->
      <section class="dashboard">
        <div>Name: <strong><span class="name"></span></strong></div>
        <div>Weight: <strong><span class="weight"></span> lbs</strong></div>
        <div>Happiness: <strong><span class="happiness"></span> tail wags/min</strong></div>
        <div>Energy: <strong><span class="energy"></span> / 10</strong></div>

        <!-- Visual notification: displays a comment from the pet after each button press -->
        <div class="notification"></div>

        <div class="button-container">
          <button class="treat-button">Treat</button>
          <button class="play-button">Play</button>
          <button class="exercise-button">Exercise</button>
          <button class="nap-button">Nap</button>
        </div>
      </section>
    </main>

    <!-- jQuery library loaded before script.js so $ is available -->
    <script src="https://code.jquery.com/jquery-2.2.1.min.js"
            integrity="sha256-gvQgAFzTH6trSrAWoH1iPo9Xc96QxSZ3feW6kem+O00="
            crossorigin="anonymous"></script>
    <script src="script.js"></script>

  </body>
</html>
